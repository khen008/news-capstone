<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Global News</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f4f4;
}

.hero{
background:#222;
color:white;
padding:60px;
margin-bottom:40px;
}

.card:hover{
transform:scale(1.02);
transition:0.3s;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand" href="/">Global News</a>

<a href="/admin" class="btn btn-outline-light btn-sm">Admin</a>

</div>
</nav>


<div class="hero text-center">

<h1>Breaking News</h1>

<p>Latest stories from around the world</p>

</div>


<div class="container">

<div class="row">

{% for article in articles %}

<div class="col-md-4 mb-4">

<div class="card shadow-sm">

{% if article.image %}
<img src="{{ article.image.url }}" class="card-img-top">
{% else %}
<img src="https://picsum.photos/600/400?random={{article.id}}" class="card-img-top">
{% endif %}

<div class="card-body">

<h5>{{ article.title }}</h5>

<p>{{ article.content|truncatewords:20 }}</p>

<a href="/article/{{ article.id }}/" class="btn btn-dark">Read More</a>

</div>

</div>

</div>

{% endfor %}

</div>

</div>

</body>

</html>
