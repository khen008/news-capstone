<!DOCTYPE html>
<html>

<head>

<title>{{ article.title }}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h1>{{ article.title }}</h1>

{% if article.image %}

<img src="{{ article.image.url }}" class="img-fluid mb-4">

{% endif %}

<p>{{ article.content }}</p>

<a href="/" class="btn btn-dark mt-3">Back to News</a>

</div>

</body>

</html>
